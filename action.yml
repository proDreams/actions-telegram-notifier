name: "Rust Telegram Notify Action"
description: "Sends notifications to Telegram from GitHub Actions"
author: "Ivan Ashikhmin"
inputs:
  token:
    description: "Telegram Bot Token"
    required: true
  chat_id:
    description: "Chat ID to send the notification"
    required: true
  api_url:
    description: "Custom bot API URL"
    required: false
  thread_id:
    description: "Thread ID (optional)"
    required: false
  status:
    description: "Status of the workflow (e.g., success, failure)"
    required: false
  title:
    description: "Title text"
    required: false
  message:
    description: "Message text"
    required: false
  footer:
    description: "Footer text"
    required: false
  notify_fields:
    description: "Additional fields"
    required: false
outputs:
  notify_result:
    description: "Result of the notification"
runs:
  using: "docker"
  image: "docker://alexanderntk/telegram-notify@sha256:58e153ff59afc73ab833aebfb59399128ba0b61ab886f23f541fd58ffa2580d9"
branding:
  icon: "send"
  color: "blue"
